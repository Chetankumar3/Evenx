services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evenx}
      POSTGRES_USER: ${POSTGRES_USER:-evenx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evenx_dev_password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evenx}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # Ex => keyspace + expired-event notifications, required by restorer.
    command: ["redis-server", "--notify-keyspace-events", "Ex"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  main:
    image: us-central1-docker.pkg.dev/project-cdd074dc-6291-4d7f-a2a/evenx/evenx-main:1.0
    pull_policy: always
    env_file: ./.env
    ports:
      - "${MAIN_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  statesync:
    image: us-central1-docker.pkg.dev/project-cdd074dc-6291-4d7f-a2a/evenx/evenx-statesync:1.0
    pull_policy: always
    env_file: ./.env
    ports:
      - "${STATESYNC_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  restorer:
    image: us-central1-docker.pkg.dev/project-cdd074dc-6291-4d7f-a2a/evenx/evenx-restorer:1.0
    pull_policy: always
    env_file: ./.env
    depends_on:
      redis:
        condition: service_healthy

volumes: {}
